<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DaisyInvestigation – Forensic & Law Enforcement Platform</title>
  <!-- Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0f1e;
      color: #eef2ff;
      overflow-x: hidden;
    }
    :root { --neon: #00f5c0; }
    .container { max-width: 1000px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .badge-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .badge {
      background: rgba(0,245,192,0.1);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      border: 1px solid rgba(0,245,192,0.3);
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 40px;
      color: var(--neon);
    }
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(10,15,30,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0,245,192,0.3);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 0.7rem;
      gap: 4px;
      cursor: pointer;
    }
    .nav-item.active { color: var(--neon); }
    .nav-icon { font-size: 1.5rem; }
    .card {
      background: rgba(15,23,42,0.6);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(0,245,192,0.2);
    }
    button {
      background: rgba(0,245,192,0.2);
      border: 1px solid var(--neon);
      padding: 8px 16px;
      border-radius: 40px;
      color: var(--neon);
      cursor: pointer;
      margin: 4px;
    }
    .nft-banner {
      background: linear-gradient(135deg, #00f5c0, #0a8f6e);
      color: #0a0f1e;
      padding: 10px;
      border-radius: 20px;
      text-align: center;
      margin: 16px 0;
      font-weight: bold;
    }
    .admin-section {
      background: rgba(255,100,0,0.15);
      border-left: 4px solid #ff6600;
      padding: 12px;
      border-radius: 16px;
      margin-top: 16px;
    }
    footer {
      margin-top: 40px;
      padding: 20px 0;
      text-align: center;
      font-size: 0.7rem;
      border-top: 1px solid rgba(0,245,192,0.2);
    }
    canvas {
      border: 1px solid var(--neon);
      border-radius: 16px;
      max-width: 100%;
      background: #000;
    }
    input, textarea, select {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
      border-radius: 20px;
      border: 1px solid var(--neon);
      background: #0f172a;
      color: white;
    }
    .progress-bar {
      background: #333;
      border-radius: 20px;
      height: 20px;
      width: 100%;
      margin: 12px 0;
    }
    .progress-fill {
      background: var(--neon);
      border-radius: 20px;
      height: 100%;
      width: 0%;
    }
    @media (max-width: 640px) { .container { padding: 12px; } }
  </style>
</head>
<body>
<div class="container" id="appContainer">
  <div class="header">
    <h2>🕵️ DaisyInvestigation</h2>
    <div class="badge-row">
      <span class="badge">🔐 Gov License Required</span>
      <span class="badge">📜 Chain of Custody</span>
      <span class="badge">🤖 AI Director</span>
      <div id="userWidget"></div>
      <button class="icon-btn" id="settingsBtn">⚙️</button>
    </div>
  </div>
  <div id="screenContent"></div>
  <footer>
    <a href="https://owensonicinfinity.netlify.app" target="_blank">OwenSonicInfinity.netlify.app</a> | 
    <a href="https://owensonicinfinity.github.io" target="_blank">OwenSonicInfinity.github.io</a><br>
    Cleveland, Ohio 44089 | owensonicinfinity@gmail.com<br>
    © 2026 Douglas Owens Jr. All rights reserved.
  </footer>
</div>

<div class="nav-bar">
  <button class="nav-item" data-nav="home"><span class="nav-icon">🏠</span><span>Home</span></button>
  <button class="nav-item" data-nav="forensics"><span class="nav-icon">🔬</span><span>Forensics</span></button>
  <button class="nav-item" data-nav="evidence"><span class="nav-icon">📦</span><span>Evidence</span></button>
  <button class="nav-item" data-nav="director"><span class="nav-icon">🤖</span><span>AI Director</span></button>
  <button class="nav-item" data-nav="profile"><span class="nav-icon">👤</span><span>Profile</span></button>
</div>

<script>
  // ==================== Firebase & Globals ====================
  const firebaseConfig = {
    apiKey: "AIzaSyDummyKeyForDemoOnly",
    authDomain: "daisyos-demo.firebaseapp.com",
    projectId: "daisyos-demo",
  };
  let auth;
  try {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
  } catch(e) { console.warn("Firebase init failed"); }

  let currentUser = null;
  let currentScreen = 'home';
  let geminiApiKey = localStorage.getItem("geminiApiKey") || "";
  let customBgImage = localStorage.getItem("customBgImage") || "";
  let walletBalance = parseFloat(localStorage.getItem("walletBalance")) || 0;
  let userNFTs = JSON.parse(localStorage.getItem("userNFTs")) || [];
  
  // Case data
  let evidenceItems = JSON.parse(localStorage.getItem("evidenceItems")) || [];
  let witnessStatements = JSON.parse(localStorage.getItem("witnessStatements")) || [];
  let investigationPhase = parseInt(localStorage.getItem("investigationPhase")) || 0; // 0-7
  const phases = [
    "Initial Response", "Scene Assessment", "Evidence Collection",
    "Witness Interviews", "Suspect Questioning", "Analysis",
    "Follow-up", "Case Closure"
  ];

  // Government license check (demo: admin email bypass)
  function hasLicense() {
    if (!currentUser) return false;
    const email = (currentUser.email || "").toLowerCase();
    const name = (currentUser.displayName || "").toLowerCase();
    // Admin email grants full access
    if (email === "owensonicinfinity@gmail.com" || name.includes("douglas")) return true;
    // Check for stored license key
    let license = localStorage.getItem("govLicenseKey");
    return license === "DAISY-GOV-2026";
  }

  function isAdmin() {
    if (!currentUser) return false;
    const email = (currentUser.email || "").toLowerCase();
    const name = (currentUser.displayName || "").toLowerCase();
    return email === "owensonicinfinity@gmail.com" || name.includes("douglas");
  }

  function applyBackground() {
    if (customBgImage && customBgImage.trim()) {
      document.body.style.background = `url('${customBgImage}') center/cover fixed`;
    } else {
      document.body.style.background = "";
      document.body.style.backgroundColor = "#0a0f1e";
    }
  }

  // ==================== Forensics: Footprint/Tire Analysis (Real Canvas Measurement) ====================
  let imgElement = null;
  let canvas = null;
  let ctx = null;
  let scalePixelsPerCm = null;
  let drawing = false;
  let startPoint = null;

  function initForensicsCanvas() {
    canvas = document.getElementById("forensicsCanvas");
    if (!canvas) return;
    ctx = canvas.getContext("2d");
    canvas.addEventListener("mousedown", startDrawing);
    canvas.addEventListener("mousemove", draw);
    canvas.addEventListener("mouseup", endDrawing);
    canvas.addEventListener("touchstart", startDrawingTouch);
    canvas.addEventListener("touchmove", drawTouch);
    canvas.addEventListener("touchend", endDrawing);
  }

  function startDrawing(e) {
    drawing = true;
    startPoint = getCoordinates(e);
  }
  function draw(e) {
    if (!drawing) return;
    const current = getCoordinates(e);
    if (startPoint && ctx) {
      ctx.beginPath();
      ctx.moveTo(startPoint.x, startPoint.y);
      ctx.lineTo(current.x, current.y);
      ctx.strokeStyle = "red";
      ctx.lineWidth = 2;
      ctx.stroke();
      // Show length in cm if scale is set
      if (scalePixelsPerCm) {
        let pixelDist = Math.hypot(current.x - startPoint.x, current.y - startPoint.y);
        let cm = pixelDist / scalePixelsPerCm;
        document.getElementById("measureLength").innerText = `Measured: ${cm.toFixed(1)} cm`;
      }
    }
  }
  function endDrawing() { drawing = false; startPoint = null; }
  function getCoordinates(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let clientX, clientY;
    if (e.touches) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    let x = (clientX - rect.left) * scaleX;
    let y = (clientY - rect.top) * scaleY;
    return { x, y };
  }
  function startDrawingTouch(e) { e.preventDefault(); startDrawing(e); }
  function drawTouch(e) { e.preventDefault(); draw(e); }

  async function loadImageForAnalysis(file) {
    const reader = new FileReader();
    reader.onload = function(event) {
      const img = new Image();
      img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        imgElement = img;
        // Reset scale
        scalePixelsPerCm = null;
        document.getElementById("measureLength").innerText = "Set scale: draw known length (e.g., 30cm ruler) and enter actual cm.";
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  }

  function setScaleFromDrawing(actualCm) {
    if (!ctx || !startPoint) return;
    // The last drawn line length in pixels
    // We need to capture the last drawn line – for simplicity, we'll recalc from current measure
    // Instead, we'll use a separate prompt: user draws a line of known length (e.g., ruler) and enters length.
    // We'll store the last drawn line coordinates from a global variable.
    if (window.lastDrawEnd && window.lastDrawStart) {
      let pixelDist = Math.hypot(window.lastDrawEnd.x - window.lastDrawStart.x, window.lastDrawEnd.y - window.lastDrawStart.y);
      scalePixelsPerCm = pixelDist / actualCm;
      alert(`Scale set: ${scalePixelsPerCm.toFixed(2)} pixels/cm`);
    } else {
      alert("Draw a line on the image first (e.g., along a 30cm ruler), then set scale.");
    }
  }

  // Track last drawn line
  function endDrawingWithStore() {
    if (startPoint && ctx) {
      window.lastDrawStart = startPoint;
      // We need the last point – can't get easily, so we store on each move
    }
    endDrawing();
  }
  // Override endDrawing to store last point
  let lastMovePoint = null;
  const origDraw = draw;
  window.draw = function(e) {
    if (!drawing) return;
    const current = getCoordinates(e);
    if (startPoint && ctx) {
      ctx.beginPath();
      ctx.moveTo(startPoint.x, startPoint.y);
      ctx.lineTo(current.x, current.y);
      ctx.stroke();
      window.lastDrawStart = startPoint;
      window.lastDrawEnd = current;
      if (scalePixelsPerCm) {
        let pixelDist = Math.hypot(current.x - startPoint.x, current.y - startPoint.y);
        let cm = pixelDist / scalePixelsPerCm;
        document.getElementById("measureLength").innerText = `Measured: ${cm.toFixed(1)} cm`;
      }
    }
  };
  // Replace functions
  window.draw = window.draw;

  function analyzeFootprint() {
    if (!scalePixelsPerCm) { alert("Set scale first using a known measurement."); return; }
    let lengthCm = 0;
    if (window.lastDrawStart && window.lastDrawEnd) {
      let pixelDist = Math.hypot(window.lastDrawEnd.x - window.lastDrawStart.x, window.lastDrawEnd.y - window.lastDrawStart.y);
      lengthCm = pixelDist / scalePixelsPerCm;
    } else {
      alert("Draw a line along the footprint length.");
      return;
    }
    let result = "";
    if (lengthCm < 15) result = "Small animal (e.g., cat, fox)";
    else if (lengthCm < 25) result = "Human adult (approx size)";
    else if (lengthCm < 40) result = "Large animal (deer, dog)";
    else result = "Very large (bear, moose)";
    document.getElementById("analysisResult").innerHTML = `<strong>Footprint Analysis:</strong> Length ${lengthCm.toFixed(1)} cm – ${result}`;
    // Add to evidence
    evidenceItems.push({ type: "Footprint", description: result, lengthCm, timestamp: new Date() });
    localStorage.setItem("evidenceItems", JSON.stringify(evidenceItems));
  }

  // ==================== AI Investigation Director ====================
  function updateDirectorUI() {
    let percent = (investigationPhase / (phases.length-1)) * 100;
    document.getElementById("phaseProgressFill").style.width = percent + "%";
    document.getElementById("currentPhase").innerText = phases[investigationPhase];
    let nextBtn = document.getElementById("nextPhaseBtn");
    if (nextBtn) {
      if (investigationPhase >= phases.length-1) nextBtn.disabled = true;
      else nextBtn.disabled = false;
    }
    let phaseSpecific = "";
    switch(investigationPhase) {
      case 0: phaseSpecific = "Secure the scene, call for backup, ensure safety."; break;
      case 1: phaseSpecific = "Photograph scene, identify entry/exit points."; break;
      case 2: phaseSpecific = "Collect physical evidence, log chain of custody."; break;
      case 3: phaseSpecific = "Interview witnesses, record statements."; break;
      case 4: phaseSpecific = "Question suspects, establish alibis."; break;
      case 5: phaseSpecific = "Lab analysis of evidence, compare to database."; break;
      case 6: phaseSpecific = "Follow up on leads, re-interview if needed."; break;
      case 7: phaseSpecific = "Prepare final report, close case."; break;
    }
    document.getElementById("phaseInstructions").innerHTML = phaseSpecific;
  }

  function nextPhase() {
    if (investigationPhase < phases.length-1) {
      investigationPhase++;
      localStorage.setItem("investigationPhase", investigationPhase);
      updateDirectorUI();
      // Award NFT for completing certain phases
      if (investigationPhase === 7) {
        userNFTs.push({ name: "Case Closed Badge", value: "0.2 ETH" });
        localStorage.setItem("userNFTs", JSON.stringify(userNFTs));
        alert("🎖️ Case closed! You earned a 'Case Closed' NFT.");
      }
    }
  }

  // ==================== UI Rendering ====================
  function render() {
    const container = document.getElementById('screenContent');
    if (!hasLicense() && !isAdmin()) {
      container.innerHTML = `
        <div class="card">
          <h3>🔐 Government License Required</h3>
          <p>DaisyInvestigation is for authorized law enforcement only.</p>
          <input type="password" id="licenseKey" placeholder="Enter license key">
          <button id="verifyLicenseBtn">Verify License</button>
          <p class="badge" style="margin-top:12px;">Demo key: DAISY-GOV-2026</p>
        </div>
      `;
      document.getElementById("verifyLicenseBtn")?.addEventListener("click", () => {
        let key = document.getElementById("licenseKey").value;
        if (key === "DAISY-GOV-2026") {
          localStorage.setItem("govLicenseKey", key);
          render();
        } else alert("Invalid license key.");
      });
      return;
    }
    if (currentScreen === 'home') renderHome(container);
    else if (currentScreen === 'forensics') renderForensics(container);
    else if (currentScreen === 'evidence') renderEvidence(container);
    else if (currentScreen === 'director') renderDirector(container);
    else if (currentScreen === 'profile') renderProfile(container);
    document.querySelectorAll('.nav-item').forEach(btn => {
      if(btn.dataset.nav === currentScreen) btn.classList.add('active');
      else btn.classList.remove('active');
    });
    updateUserWidget();
  }

  function renderHome(container) {
    container.innerHTML = `
      <div class="nft-banner">🔬 DAISYINVESTIGATION – FORENSICS & AI DIRECTOR</div>
      <div class="card">
        <h3>Case Management</h3>
        <p>Current Phase: ${phases[investigationPhase]}</p>
        <div class="progress-bar"><div id="homeProgress" class="progress-fill" style="width:${(investigationPhase/(phases.length-1))*100}%"></div></div>
        <button id="goToDirector">Go to AI Director →</button>
      </div>
      <div class="card">
        <h3>Evidence Summary</h3>
        <p>Total items: ${evidenceItems.length} | Witness statements: ${witnessStatements.length}</p>
      </div>
      <div class="nft-banner">🏆 Solved cases mint NFTs. Trade them on SAYSO.</div>
    `;
    document.getElementById("goToDirector")?.addEventListener("click", () => {
      currentScreen = "director";
      render();
    });
  }

  function renderForensics(container) {
    container.innerHTML = `
      <div class="card">
        <h3>🔬 Footprint / Tire Track Analysis</h3>
        <input type="file" id="imageUpload" accept="image/*">
        <canvas id="forensicsCanvas" style="width:100%; height:auto; background:#000;"></canvas>
        <div class="controls">
          <button id="setScaleBtn">Set Scale (after drawing known length)</button>
          <input type="number" id="scaleCm" placeholder="Actual cm of drawn line">
          <button id="analyzeBtn">Analyze Footprint</button>
        </div>
        <div id="analysisResult" class="badge" style="margin-top:12px;"></div>
        <div id="measureLength" class="badge">Draw a line to measure</div>
      </div>
    `;
    const fileInput = document.getElementById("imageUpload");
    fileInput?.addEventListener("change", (e) => {
      if (e.target.files[0]) loadImageForAnalysis(e.target.files[0]);
    });
    initForensicsCanvas();
    document.getElementById("setScaleBtn")?.addEventListener("click", () => {
      let actualCm = parseFloat(document.getElementById("scaleCm").value);
      if (actualCm && window.lastDrawStart && window.lastDrawEnd) {
        let pixelDist = Math.hypot(window.lastDrawEnd.x - window.lastDrawStart.x, window.lastDrawEnd.y - window.lastDrawStart.y);
        scalePixelsPerCm = pixelDist / actualCm;
        alert(`Scale set: ${scalePixelsPerCm.toFixed(2)} pixels/cm`);
      } else alert("Draw a line on the image first (e.g., along a ruler), then enter actual length in cm.");
    });
    document.getElementById("analyzeBtn")?.addEventListener("click", analyzeFootprint);
  }

  function renderEvidence(container) {
    let evHtml = evidenceItems.map((e,i) => `<div><strong>${e.type}</strong>: ${e.description} (${new Date(e.timestamp).toLocaleString()})</div>`).join('');
    let witHtml = witnessStatements.map((w,i) => `<div><strong>${w.name}</strong>: ${w.statement} (signed: ${w.signature})</div>`).join('');
    container.innerHTML = `
      <div class="card">
        <h3>📦 Chain of Custody</h3>
        <button id="addEvidenceBtn">+ Add Evidence Item</button>
        <div id="evidenceList">${evHtml || "No evidence yet."}</div>
      </div>
      <div class="card">
        <h3>🗣️ Witness Statements</h3>
        <button id="addWitnessBtn">+ Add Witness Statement</button>
        <div id="witnessList">${witHtml || "No statements yet."}</div>
      </div>
      <button id="exportReportBtn">📄 Generate Case Report (JSON)</button>
    `;
     document.getElementById("addEvidenceBtn")?.addEventListener("click", () => {
      let type = prompt("Evidence type (e.g., Footprint, DNA, Weapon):");
      let desc = prompt("Description:");
      if (type && desc) {
        evidenceItems.push({ type, description: desc, timestamp: new Date() });
        localStorage.setItem("evidenceItems", JSON.stringify(evidenceItems));
        renderEvidence(container);
      }
    });
    document.getElementById("addWitnessBtn")?.addEventListener("click", () => {
      let name = prompt("Witness name:");
      let statement = prompt("Statement:");
      let signature = prompt("Signature (type name):");
      if (name && statement) {
        witnessStatements.push({ name, statement, signature, timestamp: new Date() });
        localStorage.setItem("witnessStatements", JSON.stringify(witnessStatements));
        renderEvidence(container);
      }
    });
    document.getElementById("exportReportBtn")?.addEventListener("click", () => {
      let report = { evidenceItems, witnessStatements, investigationPhase: phases[investigationPhase], generated: new Date() };
      let dataStr = JSON.stringify(report, null, 2);
      let blob = new Blob([dataStr], {type: "application/json"});
      let url = URL.createObjectURL(blob);
      let a = document.createElement("a");
      a.href = url;
      a.download = `case_report_${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });
  }

  function renderDirector(container) {
    container.innerHTML = `
      <div class="card">
        <h3>🤖 AI Investigation Director</h3>
        <div class="progress-bar"><div id="phaseProgressFill" class="progress-fill"></div></div>
        <p>Current Phase: <strong id="currentPhase"></strong></p>
        <p id="phaseInstructions"></p>
        <button id="nextPhaseBtn">Next Phase →</button>
        <button id="resetCaseBtn">Reset Case</button>
      </div>
    `;
    updateDirectorUI();
    document.getElementById("nextPhaseBtn")?.addEventListener("click", nextPhase);
    document.getElementById("resetCaseBtn")?.addEventListener("click", () => {
      if (confirm("Reset entire case? All evidence and progress will be lost.")) {
        investigationPhase = 0;
        evidenceItems = [];
        witnessStatements = [];
        localStorage.setItem("investigationPhase", investigationPhase);
        localStorage.setItem("evidenceItems", JSON.stringify(evidenceItems));
        localStorage.setItem("witnessStatements", JSON.stringify(witnessStatements));
        renderDirector(container);
      }
    });
  }

  function renderProfile(container) {
    let nftsHtml = userNFTs.map(n => `<div>${n.name} – ${n.value}</div>`).join('');
    container.innerHTML = `
      <div class="card" style="text-align:center">
        <img src="${currentUser?.photoURL || 'https://via.placeholder.com/80'}" style="width:80px; border-radius:50%;">
        <h3>${currentUser?.displayName || "Officer"}</h3>
        <p>${currentUser?.email || "Not signed in"}</p>
        <p>Wallet: ${walletBalance.toFixed(2)} ETH</p>
        <button id="addFundsBtn">Add 1 ETH (demo)</button>
      </div>
      <div class="card">
        <h3>🏆 NFTs & Badges</h3>
        ${nftsHtml || "No NFTs yet. Complete investigations to earn."}
      </div>
    `;
    document.getElementById("addFundsBtn")?.addEventListener("click", () => {
      walletBalance += 1;
      localStorage.setItem("walletBalance", walletBalance);
      renderProfile(container);
    });
  }

  // ==================== User Auth ====================
  function updateUserWidget() {
    const widget = document.getElementById('userWidget');
    if (currentUser) {
      widget.innerHTML = `<img src="${currentUser.photoURL || 'https://via.placeholder.com/32'}" style="width:32px; border-radius:50%;"> <span>${currentUser.displayName || currentUser.email}</span> <button id="logoutBtn" class="icon-btn" style="font-size:0.8rem;">🚪</button>`;
      document.getElementById('logoutBtn')?.addEventListener('click', () => {
        if(auth) auth.signOut();
        currentUser = null;
        localStorage.removeItem('daisyInvestUser');
        render();
      });
    } else {
      widget.innerHTML = `<button id="googleSignInBtn" class="badge">🔑 Sign in with Google</button>`;
      document.getElementById('googleSignInBtn')?.addEventListener('click', () => {
        if (auth) {
          const provider = new firebase.auth.GoogleAuthProvider();
          auth.signInWithPopup(provider).then(result => {
            currentUser = result.user;
            localStorage.setItem('daisyInvestUser', JSON.stringify({ displayName: currentUser.displayName, email: currentUser.email, photoURL: currentUser.photoURL }));
            render();
          }).catch(err => { mockSignIn(); });
        } else { mockSignIn(); }
      });
    }
  }
  function mockSignIn() {
    currentUser = { displayName: "Douglas Owens", email: "owensonicinfinity@gmail.com", photoURL: "https://via.placeholder.com/80" };
    localStorage.setItem('daisyInvestUser', JSON.stringify(currentUser));
    render();
  }

 // ==================== Settings ====================
  function openSettings() {
    let modalHtml = `
      <div id="settingsModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); z-index:1000; display:flex; justify-content:center; align-items:center;">
        <div style="background:#1e293b; border-radius:32px; max-width:500px; width:90%; padding:24px; border:2px solid var(--neon);">
          <div style="display:flex; justify-content:space-between;"><h3>⚙️ Settings</h3><button id="closeSettingsBtn" style="background:none; border:none; font-size:1.8rem;">&times;</button></div>
          <div><label>Neon Color</label><input type="color" id="neonColorPicker" value="${localStorage.getItem('neonColor') || '#00f5c0'}" style="width:100%;"></div>
          <div><label>Background Image URL</label><input type="text" id="bgImageUrl" value="${customBgImage}" style="width:100%;"></div>
    `;
    if (isAdmin()) {
      modalHtml += `<div class="admin-section"><h4>🔐 Admin Controls</h4>
        <label>Gemini API Key</label><input type="password" id="geminiApiKeyInput" value="${geminiApiKey}" style="width:100%;">
        <button id="saveAdminSettings">Save Key</button>
        <p class="badge">Future AI analysis uses Gemini.</p></div>`;
    }
    modalHtml += `<button id="closeSettingsBtn2" style="margin-top:16px;">Close</button></div></div>`;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    document.getElementById('closeSettingsBtn')?.addEventListener('click', () => document.getElementById('settingsModal')?.remove());
    document.getElementById('closeSettingsBtn2')?.addEventListener('click', () => document.getElementById('settingsModal')?.remove());
    document.getElementById('neonColorPicker')?.addEventListener('change', (e) => {
      localStorage.setItem('neonColor', e.target.value);
      document.documentElement.style.setProperty('--neon', e.target.value);
    });
    document.getElementById('bgImageUrl')?.addEventListener('change', (e) => {
      customBgImage = e.target.value;
      localStorage.setItem('customBgImage', customBgImage);
      applyBackground();
    });
    if (isAdmin()) {
      document.getElementById('saveAdminSettings')?.addEventListener('click', () => {
        geminiApiKey = document.getElementById('geminiApiKeyInput').value;
        localStorage.setItem('geminiApiKey', geminiApiKey);
        alert("Gemini key saved.");
      });
    }
  }

  // ==================== Init ====================
  document.addEventListener('DOMContentLoaded', () => {
    const savedNeon = localStorage.getItem('neonColor');
    if (savedNeon) document.documentElement.style.setProperty('--neon', savedNeon);
    customBgImage = localStorage.getItem("customBgImage") || "";
    applyBackground();
    const storedUser = localStorage.getItem('daisyInvestUser');
    if (storedUser) currentUser = JSON.parse(storedUser);
    render();
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        currentScreen = btn.dataset.nav;
        render();
      });
    });
    document.getElementById('settingsBtn')?.addEventListener('click', openSettings);
  });
</script>
